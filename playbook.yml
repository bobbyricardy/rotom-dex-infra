---
- name: Setup Rotom-Dex Infrastructure
  hosts: vm
  become: true
  vars_files:
    - vars/main.yml
    - vars/vault.yml

  tasks:
    # ─── System Prerequisites ───────────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
          - git
          - vim
          - cloud-guest-utils
          - jq
          - logrotate
        state: present

    # ─── Docker ─────────────────────────────────────────────────────────
    - name: Create apt keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'
    
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/debian/gpg
        keyring: /etc/apt/keyrings/docker.gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/debian {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # ─── vm.max_map_count ───────────────────────────────────────────────
    - name: Set vm.max_map_count for Elasticsearch
      sysctl:
        name: vm.max_map_count
        value: 262144
        state: present
        reload: yes

    # ─── ELK Stack ──────────────────────────────────────────────────────
    - name: Create elk-stack directory
      file:
        path: "{{ elk_stack_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Copy docker-compose.yml
      template:
        src: templates/docker-compose.yml.j2
        dest: "{{ elk_stack_dir }}/docker-compose.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Copy apm-server.yml
      template:
        src: templates/apm-server.yml.j2
        dest: "{{ elk_stack_dir }}/apm-server.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"

    - name: Copy filebeat.yml
      template:
        src: templates/filebeat.yml.j2
        dest: "{{ elk_stack_dir }}/filebeat.yml"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0644'

    - name: Copy .env file
      template:
        src: templates/env.j2
        dest: "{{ elk_stack_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'

    - name: Start ELK stack
      shell: |
        cd {{ elk_stack_dir }}
        docker compose down --remove-orphans
        docker compose up -d
      become_user: "{{ ansible_user }}"

    # ─── Cloudflared ────────────────────────────────────────────────────
    - name: Download cloudflared
      get_url:
        url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        dest: /tmp/cloudflared.deb

    - name: Install cloudflared
      apt:
        deb: /tmp/cloudflared.deb

    - name: Create cloudflared config directory
      file:
        path: /etc/cloudflared
        state: directory
        mode: '0755'

    - name: Copy cloudflared config
      template:
        src: templates/cloudflared-config.yml.j2
        dest: /etc/cloudflared/config.yml

    - name: Copy cloudflared credentials
      copy:
        src: files/cloudflared-credentials.json
        dest: "/etc/cloudflared/{{ cloudflared_tunnel_id }}.json"
        mode: '0600'

    - name: Install cloudflared service
      command: cloudflared service install
      ignore_errors: yes
      register: cf_install
      changed_when: cf_install.rc == 0

    - name: Start cloudflared service
      systemd:
        name: cloudflared
        state: started
        enabled: yes

    # ─── Elasticsearch Index Template ───────────────────────────────────
    - name: Wait for Elasticsearch to be ready
      uri:
        url: http://localhost:9200
        method: GET
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        status_code: 200
      register: result
      until: result.status == 200
      retries: 12
      delay: 10
      when: not ansible_check_mode

    - name: Set default replicas to 0
      uri:
        url: http://localhost:9200/_template/default_replicas
        method: PUT
        user: elastic
        password: "{{ elastic_password }}"
        force_basic_auth: yes
        body_format: json
        body:
          index_patterns: ["*"]
          settings:
            number_of_replicas: 0
        status_code: 200
      when: not ansible_check_mode

    # ─── SLI Collector ──────────────────────────────────────────────────
    - name: Copy SLI collector script
      template:
        src: templates/sli-collector.sh.j2
        dest: "/home/{{ ansible_user }}/sli-collector.sh"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Add SLI collector cron job
      cron:
        name: "rotom-dex SLI collector"
        minute: "*/5"
        job: "/home/{{ ansible_user }}/sli-collector.sh >> /home/{{ ansible_user }}/sli-collector.log 2>&1"
        user: "{{ ansible_user }}"
    
    - name: Add logrotate config for SLI collector
      copy:
        dest: /etc/logrotate.d/sli-collector
        content: |
          /home/{{ ansible_user }}/sli-collector.log {
              daily
              rotate 7
              compress
              missingok
              notifempty
          }